<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#001a2e"/>
      <stop offset="100%" stop-color="#000810"/>
    </radialGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="lidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="shadowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#164e63"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="roundedSquare">
      <rect width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" clip-path="url(#roundedSquare)">
    <line x1="0" y1="128" x2="512" y2="128" stroke="white" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="white" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="white" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="white" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="white" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="white" stroke-width="1"/>
  </g>

  <!-- Glow halo -->
  <ellipse cx="256" cy="210" rx="130" ry="100" fill="#0891b2" opacity="0.15" filter="url(#glow)"/>

  <!-- ── PACKAGE / BOX ─────────────────────────────── -->

  <!-- Box shadow (bottom face — isometric illusion) -->
  <polygon points="256,290 370,230 370,310 256,370" fill="url(#shadowGrad)" opacity="0.7"/>

  <!-- Box left face -->
  <polygon points="142,230 256,290 256,370 142,310" fill="#0e7490" opacity="0.85"/>

  <!-- Box front face -->
  <polygon points="142,150 256,210 256,290 142,230" fill="url(#boxGrad)"/>
  <!-- Tape stripe on front -->
  <polygon points="190,128 220,144 220,270 190,254" fill="rgba(255,255,255,0.12)"/>

  <!-- Box right face (top) -->
  <polygon points="256,210 370,150 370,230 256,290" fill="#22d3ee" opacity="0.9"/>

  <!-- Box lid (top) -->
  <polygon points="142,150 256,90 370,150 256,210" fill="url(#lidGrad)"/>
  <!-- Lid glow -->
  <polygon points="142,150 256,90 370,150 256,210" fill="url(#lidGrad)" opacity="0.35" filter="url(#glow)"/>

  <!-- Lid crease line -->
  <line x1="256" y1="90" x2="256" y2="210" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <line x1="142" y1="150" x2="370" y2="150" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Corner highlight on lid -->
  <polygon points="256,90 313,120 256,150 199,120" fill="rgba(255,255,255,0.15)"/>

  <!-- ── WORDMARK ─────────────────────────────────── -->
  <line x1="156" y1="388" x2="356" y2="388" stroke="rgba(34,211,238,0.25)" stroke-width="1"/>

  <text
    x="256" y="422"
    text-anchor="middle"
    font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="38"
    font-weight="800"
    letter-spacing="12"
    fill="white"
    opacity="0.9"
  >ENIGMA</text>

  <text
    x="256" y="454"
    text-anchor="middle"
    font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="18"
    font-weight="500"
    letter-spacing="8"
    fill="rgba(103,232,249,0.8)"
  >OPS</text>

  <!-- Corner dots -->
  <circle cx="88" cy="88" r="4" fill="rgba(34,211,238,0.3)"/>
  <circle cx="424" cy="88" r="4" fill="rgba(34,211,238,0.3)"/>
  <circle cx="88" cy="424" r="4" fill="rgba(34,211,238,0.15)"/>
  <circle cx="424" cy="424" r="4" fill="rgba(34,211,238,0.15)"/>
</svg>
